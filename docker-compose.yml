services:
  weaviate:
    image: semitechnologies/weaviate:1.27.0
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
      # Single-node deploy: v1.27+ defaults to multi-node RAFT and hangs
      # forever trying to join a phantom peer without these.
      CLUSTER_HOSTNAME: "node1"
      RAFT_BOOTSTRAP_EXPECT: "1"
      RAFT_JOIN: "node1"
    volumes:
      - weaviate_data:/var/lib/weaviate
    ports:
      - "8080:8080"
      - "50051:50051"
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      WEAVIATE_URL: http://weaviate:8080
    ports:
      - "8000:8000"
    depends_on:
      - weaviate
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Read from a root .env file or shell env; falls back to localhost for
        # dev. Set VITE_API_BASE_URL=http://<public-ip>:8000 in a repo-root
        # .env file before `docker compose build` so the bundle points at the
        # right backend. Vite reads it at BUILD time, not runtime.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  weaviate_data:
