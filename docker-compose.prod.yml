# Production compose — runs pre-built images pulled from GHCR (built in CI),
# instead of building on the EC2 box. Used by the deploy job in
# .github/workflows/ci-cd.yml. For local dev, use docker-compose.yml (which
# builds from source).
#
# The image owner is your GitHub username/org — replace `darsh-del` below if
# the repo moves. Images are tagged :latest by CI; pin to a :<sha> tag here to
# roll back to a specific build.
services:
  weaviate:
    image: semitechnologies/weaviate:1.27.0
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: "node1"
      RAFT_BOOTSTRAP_EXPECT: "1"
      RAFT_JOIN: "node1"
    volumes:
      - weaviate_data:/var/lib/weaviate
    ports:
      - "8080:8080"
      - "50051:50051"
    restart: unless-stopped

  backend:
    image: ghcr.io/darsh-del/aichatbot-backend:latest
    env_file: ./backend/.env
    environment:
      WEAVIATE_URL: http://weaviate:8080
    ports:
      - "8000:8000"
    depends_on:
      - weaviate
    restart: unless-stopped

  frontend:
    image: ghcr.io/darsh-del/aichatbot-frontend:latest
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  weaviate_data:
